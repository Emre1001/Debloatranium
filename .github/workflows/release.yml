name: Release

# Push a version tag to build + publish the portable .exe:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm install

      - name: Build portable .exe (no installer)
        run: npm run tauri build -- --no-bundle

      - name: Publish portable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Debloatranium ${{ github.ref_name }}"
          body: |
            ☢️ **Debloatranium ${{ github.ref_name }}** — portable, no install.

            Download **`Debloatranium.exe`** below and run as **Administrator**.
            (Needs the WebView2 runtime — preinstalled on Windows 10 1803+ / 11.)
          files: src-tauri/target/release/Debloatranium.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
